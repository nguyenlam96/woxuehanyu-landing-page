<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wo xue Hanyu</title>
  <link rel="icon" href="/assets/app_icon.png">
  <meta name="description" content="Download the Wo xue Hanyu app to view this video.">
  <meta name="apple-itunes-app" content="app-id=6754384426">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe4ee;
      --brand: #2563eb;
      --brand-strong: #1d4ed8;
      --brand-soft: #eff6ff;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 34%),
        linear-gradient(180deg, #eff6ff 0%, #f8fafc 42%, #eef2ff 100%);
      color: var(--text);
    }

    .shell {
      width: min(640px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px 28px 20px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(99, 102, 241, 0.08));
      border-bottom: 1px solid rgba(219, 228, 238, 0.8);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .brand img {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      flex-shrink: 0;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.18);
    }

    .brand h1 {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      color: var(--text);
    }

    .headline {
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: 0;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .copy {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 52ch;
    }

    .content {
      padding: 24px 28px 28px;
    }

    .video-meta {
      margin-bottom: 20px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8fbff;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .video-meta strong {
      color: var(--text);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 18px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      border: 1px solid transparent;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button.primary {
      background: var(--brand);
      color: white;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }

    .button.primary:hover {
      background: var(--brand-strong);
    }

    .button.secondary {
      background: var(--brand-soft);
      color: var(--brand-strong);
      border-color: rgba(37, 99, 235, 0.16);
    }

    .button.secondary:hover {
      background: #dbeafe;
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .hero,
      .content {
        padding-left: 18px;
        padding-right: 18px;
      }

      .headline {
        font-size: 28px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-live="polite">
    <section class="hero">
      <div class="brand">
        <img src="/assets/app_icon.png" alt="Wo xue Hanyu app icon">
        <h1>Wo xue Hanyu</h1>
      </div>
      <div class="headline">Open this video in the app</div>
      <p class="copy">This shared video link works best inside the Wo xue Hanyu app. Install the app to watch the full video experience.</p>
    </section>

    <section class="content">
      <div id="videoMeta" class="video-meta"></div>
      <div class="actions">
        <a class="button primary" href="https://apps.apple.com/vn/app/wo-xue-hanyu/id6754384426" target="_blank" rel="noopener noreferrer">Download on App Store</a>
        <a class="button secondary" href="https://play.google.com/store/apps/details?id=com.woxuehanyu.prod" target="_blank" rel="noopener noreferrer">Get it on Google Play</a>
      </div>
      <p class="note">If the app is already installed, open the original link again from your device.</p>
    </section>
  </main>

  <script>
    (function () {
      const pathname = window.location.pathname || '';
      const videoId = pathname.replace(/^\/tube\/video\//, '').replace(/\/$/, '');
      const browserLang = navigator.language || navigator.userLanguage || '';
      let currentLang = browserLang.toLowerCase().startsWith('vi') ? 'vi' : 'en';
      const savedLang = localStorage.getItem('woxuehanyu-lang');
      if (savedLang) {
        currentLang = savedLang;
      }
      const translations = {
        en: {
          title: 'Wo xue Hanyu',
          headline: 'Open this video in the app',
          copy: 'This shared video link works best inside the Wo xue Hanyu app. Install the app to watch the full video experience.',
          videoLink: 'Video link:',
          note: 'If the app is already installed, open the original link again from your device.',
          appStore: 'Download on App Store',
          playStore: 'Get it on Google Play'
        },
        vi: {
          title: 'Wo xue Hanyu',
          headline: 'Mở video này trong ứng dụng',
          copy: 'Liên kết video này hoạt động tốt nhất trong ứng dụng Wo xue Hanyu. Hãy cài ứng dụng để xem đầy đủ video.',
          videoLink: 'Liên kết video:',
          note: 'Nếu bạn đã cài ứng dụng, hãy mở lại liên kết gốc từ thiết bị của bạn.',
          appStore: 'Tải trên App Store',
          playStore: 'Tải trên Google Play'
        }
      };
      const t = translations[currentLang];
      const videoMeta = document.getElementById('videoMeta');
      const title = document.querySelector('title');
      const headline = document.querySelector('.headline');
      const copy = document.querySelector('.copy');
      const note = document.querySelector('.note');
      const appStoreBtn = document.querySelector('.button.primary');
      const playStoreBtn = document.querySelector('.button.secondary');

      document.documentElement.lang = currentLang;
      title.textContent = t.title;
      headline.textContent = t.headline;
      copy.textContent = t.copy;
      note.textContent = t.note;
      appStoreBtn.textContent = t.appStore;
      playStoreBtn.textContent = t.playStore;

      if (videoId) {
        const label = document.createElement('strong');
        label.textContent = t.videoLink + ' ';
        const value = document.createElement('span');
        value.textContent = videoId;
        videoMeta.appendChild(label);
        videoMeta.appendChild(value);
      } else {
        videoMeta.textContent = t.videoLink;
      }
    })();
  </script>
</body>
</html>
