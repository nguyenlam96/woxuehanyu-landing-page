<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed - WoXueHanyu</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-icon {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      color: white;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
      animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0) rotate(-180deg);
        opacity: 0;
      }
      to {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    h1 {
      color: #111827;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      animation: fadeIn 0.6s ease-out 0.4s both;
    }

    .message {
      color: #6b7280;
      font-size: 16px;
      margin: 16px 0;
      line-height: 1.6;
      animation: fadeIn 0.6s ease-out 0.5s both;
    }

    .email-display {
      background: #f3f4f6;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      color: #374151;
      font-weight: 500;
      margin: 20px 0;
      word-break: break-all;
      animation: fadeIn 0.6s ease-out 0.6s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      background: #f0fdf4;
      border-radius: 12px;
      font-size: 14px;
      color: #166534;
      border: 1px solid #bbf7d0;
      animation: fadeIn 0.6s ease-out 0.7s both;
    }

    .next-steps {
      margin-top: 24px;
      text-align: left;
      padding: 20px;
      background: #fafafa;
      border-radius: 12px;
      animation: fadeIn 0.6s ease-out 0.8s both;
    }

    .next-steps h3 {
      font-size: 16px;
      color: #111827;
      margin-bottom: 12px;
    }

    .next-steps ul {
      list-style: none;
      padding: 0;
    }

    .next-steps li {
      padding: 8px 0;
      color: #6b7280;
      font-size: 14px;
      display: flex;
      align-items: flex-start;
    }

    .next-steps li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      margin-right: 12px;
      font-size: 16px;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 24px;
      animation: bounceIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    .button {
      display: inline-block;
      width: 100%;
      padding: 16px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 600;
      font-size: 16px;
      margin-top: 24px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
      animation: fadeIn 0.6s ease-out 0.9s both;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
    }

    .button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✓</div>
    <h1>Email Confirmed!</h1>
    <p class="message">Your email has been successfully verified.</p>

    <div id="emailDisplay"></div>

    <div class="info">
      🎉 You're all set! Your account is now active.
    </div>

    <a href="#" id="openAppBtn" class="button">🚀 Open WoXueHanyu App</a>

    <div class="next-steps">
      <h3>What's Next?</h3>
      <ul>
        <li>Download the WoXueHanyu app from App Store or Google Play</li>
        <li>Sign in with your verified email</li>
        <li>Start your Chinese learning journey</li>
      </ul>
    </div>
  </div>

  <script>
    // Get parameters from URL query string
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    const code = urlParams.get('code'); // PKCE code from Supabase

    // Get parameters from URL hash fragment (Supabase may pass tokens here in some flows)
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const accessToken = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');
    const tokenType = hashParams.get('token_type');

    // Display email if available
    if (email) {
      const emailDisplay = document.getElementById('emailDisplay');
      emailDisplay.className = 'email-display';
      emailDisplay.textContent = email;
    }

    // Build deep link to open app
    function buildAppLink() {
      let deepLink = 'woxuehanyu://email-confirmed';
      const params = new URLSearchParams();

      // Add email parameter if available
      if (email) {
        params.append('email', email);
      }

      // Add PKCE code if available (app will exchange it for tokens)
      if (code) {
        params.append('code', code);
      }

      // Add Supabase tokens if available (for auto-login in non-PKCE flow)
      if (accessToken) {
        params.append('access_token', accessToken);
      }
      if (refreshToken) {
        params.append('refresh_token', refreshToken);
      }

      const queryString = params.toString();
      if (queryString) {
        deepLink += `?${queryString}`;
      }

      return deepLink;
    }

    // Set up the "Open App" button
    const openAppBtn = document.getElementById('openAppBtn');
    const appLink = buildAppLink();
    openAppBtn.href = appLink;

    // Log for debugging
    console.log('=== EMAIL CONFIRMATION SUCCESS ===');
    console.log('Email:', email || 'Not provided');
    console.log('Code:', code || 'Not provided');
    console.log('Access Token:', accessToken ? 'Present' : 'Not available');
    console.log('Refresh Token:', refreshToken ? 'Present' : 'Not available');
    console.log('App deep link:', appLink);
    console.log('Full URL:', window.location.href);
    console.log('==================================');
  </script>
</body>
</html>
