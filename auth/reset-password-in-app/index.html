<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wo xue Hanyu - Reset Password</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <meta name="apple-itunes-app" content="app-id=6754384426">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 64px;
      margin-bottom: 24px;
      animation: bounceIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    h1 {
      color: #111827;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      animation: fadeIn 0.6s ease-out 0.4s both;
    }

    .message {
      color: #6b7280;
      font-size: 16px;
      margin: 16px 0;
      line-height: 1.6;
      animation: fadeIn 0.6s ease-out 0.5s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loader {
      border: 4px solid #f3f4f6;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      animation: spin 1s linear infinite;
      margin: 24px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
      animation: fadeIn 0.6s ease-out 0.6s both;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      padding-right: 48px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input.error {
      border-color: #ef4444;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
      color: #9ca3af;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #6b7280;
    }

    .error-text {
      color: #ef4444;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .error-text.show {
      display: block;
    }

    .password-requirements {
      margin-top: 8px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 13px;
      color: #6b7280;
      text-align: left;
    }

    .password-requirements ul {
      margin: 8px 0 0 0;
      padding-left: 20px;
    }

    .password-requirements li {
      margin: 4px 0;
    }

    .password-requirements li.valid {
      color: #10b981;
    }

    .password-requirements li.invalid {
      color: #6b7280;
    }

    .button {
      display: inline-block;
      width: 100%;
      padding: 16px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 600;
      font-size: 16px;
      margin-top: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
    }

    .button:active:not(:disabled) {
      transform: translateY(0);
    }

    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .button.loading {
      position: relative;
      color: transparent;
    }

    .button.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin-left: -10px;
      margin-top: -10px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .success-icon {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      color: white;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
      animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0) rotate(-180deg);
        opacity: 0;
      }
      to {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 12px;
      font-size: 14px;
      color: #6b7280;
    }

    .info.success {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .back-to-app {
      margin-top: 24px;
      font-size: 14px;
      color: #6b7280;
    }

    .back-to-app a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .back-to-app a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="status">
      <div class="logo">🔐</div>
      <div class="loader"></div>
      <p class="message" id="loadingMessage">Preparing your password reset...</p>
    </div>
  </div>

  <script>
    // Supabase configuration for multiple environments
    const SUPABASE_CONFIG = {
      dev: {
        url: 'https://bjenzsjiidjkslgeaxah.supabase.co',
        anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqZW56c2ppaWRqa3NsZ2VheGFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE4NTc4OTcsImV4cCI6MjA3NzQzMzg5N30.oJ0Gja_IzrtpQJjdKi0KDMr1BmJWXf393bnqLeVUoUI'
      },
      prod: {
        url: 'https://pbibvjownugsilzmwwyv.supabase.co',
        anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiaWJ2am93bnVnc2lsem13d3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MzU2MjgsImV4cCI6MjA3ODIxMTYyOH0.3wvdLlljrFdyirwkd0KELiXhtGzljoy61MlRk7KbEIE'
      }
    };

    // Detect environment from URL parameter (default to prod)
    const urlParams = new URLSearchParams(window.location.search);
    const env = urlParams.get('env') === 'dev' ? 'dev' : 'prod';
    const config = SUPABASE_CONFIG[env];

    console.log('Environment:', env);

    // Initialize Supabase client with the appropriate config
    const supabase = window.supabase.createClient(config.url, config.anonKey);

    // Get URL parameters (reuse urlParams from above)
    const hashParams = new URLSearchParams(window.location.hash.substring(1));

    const code = urlParams.get('code');
    const accessToken = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');
    const errorCode = urlParams.get('error') || hashParams.get('error_code');
    const errorDescription = urlParams.get('error_description') || hashParams.get('error_description');

    // Localization
    const langParam = urlParams.get('lang');
    const browserLang = navigator.language || navigator.userLanguage;
    const userLang = langParam || (browserLang.startsWith('vi') ? 'vi' : 'en');

    // Translations
    const translations = {
      en: {
        pageTitle: 'Wo xue Hanyu - Reset Password',
        loading: 'Preparing your password reset...',
        title: 'Reset Your Password',
        subtitle: 'Enter your new password below.',
        newPassword: 'New Password',
        confirmPassword: 'Confirm Password',
        submitButton: 'Reset Password',
        submitting: 'Resetting...',
        requirements: 'Password requirements:',
        reqLength: 'At least 8 characters',
        reqUppercase: 'One uppercase letter',
        reqLowercase: 'One lowercase letter',
        reqNumber: 'One number',
        errorMismatch: 'Passwords do not match',
        errorWeak: 'Password does not meet requirements',
        errorGeneric: 'An error occurred. Please try again.',
        errorExpired: 'This password reset link has expired or is invalid.',
        errorTryAgain: 'Please request a new password reset link from the app.',
        successTitle: 'Password Reset Successful!',
        successMessage: 'Your password has been updated successfully.',
        successInfo: 'You can now sign in with your new password.',
        openApp: 'Open Wo xue Hanyu App',
        backToApp: 'Return to the app to sign in'
      },
      vi: {
        pageTitle: 'Wo xue Hanyu - Đặt Lại Mật Khẩu',
        loading: 'Đang chuẩn bị đặt lại mật khẩu...',
        title: 'Đặt Lại Mật Khẩu',
        subtitle: 'Nhập mật khẩu mới của bạn bên dưới.',
        newPassword: 'Mật khẩu mới',
        confirmPassword: 'Xác nhận mật khẩu',
        submitButton: 'Đặt lại mật khẩu',
        submitting: 'Đang xử lý...',
        requirements: 'Yêu cầu mật khẩu:',
        reqLength: 'Ít nhất 8 ký tự',
        reqUppercase: 'Một chữ cái viết hoa',
        reqLowercase: 'Một chữ cái viết thường',
        reqNumber: 'Một chữ số',
        errorMismatch: 'Mật khẩu không khớp',
        errorWeak: 'Mật khẩu không đáp ứng yêu cầu',
        errorGeneric: 'Đã xảy ra lỗi. Vui lòng thử lại.',
        errorExpired: 'Liên kết đặt lại mật khẩu đã hết hạn hoặc không hợp lệ.',
        errorTryAgain: 'Vui lòng yêu cầu liên kết đặt lại mật khẩu mới từ ứng dụng.',
        successTitle: 'Đặt Lại Mật Khẩu Thành Công!',
        successMessage: 'Mật khẩu của bạn đã được cập nhật thành công.',
        successInfo: 'Bạn có thể đăng nhập với mật khẩu mới.',
        openApp: 'Mở Ứng Dụng Wo xue Hanyu',
        backToApp: 'Quay lại ứng dụng để đăng nhập'
      }
    };

    const t = translations[userLang] || translations.en;

    // Update page title
    document.title = t.pageTitle;
    document.getElementById('loadingMessage').textContent = t.loading;

    function updateUI(content) {
      document.getElementById('status').innerHTML = content;
    }

    function showError(message, showRetry = true) {
      updateUI(`
        <div class="logo">⚠️</div>
        <h1>${userLang === 'vi' ? 'Lỗi' : 'Error'}</h1>
        <p class="message" style="color: #ef4444;">${message}</p>
        ${showRetry ? `<p class="message">${t.errorTryAgain}</p>` : ''}
        <div class="back-to-app">
          <a href="woxuehanyu://home">${t.backToApp}</a>
        </div>
      `);
    }

    function showSuccess() {
      updateUI(`
        <div class="success-icon">✓</div>
        <h1>${t.successTitle}</h1>
        <p class="message">${t.successMessage}</p>
        <div class="info success">
          ${t.successInfo}
        </div>
        <a href="woxuehanyu://login" class="button">${t.openApp}</a>
        <div class="back-to-app">
          <a href="woxuehanyu://login">${t.backToApp}</a>
        </div>
      `);
    }

    function showResetForm() {
      updateUI(`
        <div class="logo">🔐</div>
        <h1>${t.title}</h1>
        <p class="message">${t.subtitle}</p>

        <form id="resetForm">
          <div id="formError" class="error-message" style="display: none;"></div>

          <div class="form-group">
            <label for="newPassword">${t.newPassword}</label>
            <div class="input-wrapper">
              <input type="password" id="newPassword" name="newPassword" required autocomplete="new-password">
              <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">👁️</button>
            </div>
            <span class="error-text" id="newPasswordError"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">${t.confirmPassword}</label>
            <div class="input-wrapper">
              <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
              <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</button>
            </div>
            <span class="error-text" id="confirmPasswordError"></span>
          </div>

          <div class="password-requirements">
            <strong>${t.requirements}</strong>
            <ul>
              <li id="req-length" class="invalid">${t.reqLength}</li>
              <li id="req-uppercase" class="invalid">${t.reqUppercase}</li>
              <li id="req-lowercase" class="invalid">${t.reqLowercase}</li>
              <li id="req-number" class="invalid">${t.reqNumber}</li>
            </ul>
          </div>

          <button type="submit" class="button" id="submitBtn">${t.submitButton}</button>
        </form>

        <div class="back-to-app">
          <a href="woxuehanyu://home">${t.backToApp}</a>
        </div>
      `);

      // Add event listeners
      const form = document.getElementById('resetForm');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');

      newPasswordInput.addEventListener('input', validatePasswordRequirements);
      confirmPasswordInput.addEventListener('input', validateConfirmPassword);
      form.addEventListener('submit', handleSubmit);
    }

    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        button.textContent = '🙈';
      } else {
        input.type = 'password';
        button.textContent = '👁️';
      }
    }

    function validatePasswordRequirements() {
      const password = document.getElementById('newPassword').value;

      const requirements = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password)
      };

      document.getElementById('req-length').className = requirements.length ? 'valid' : 'invalid';
      document.getElementById('req-uppercase').className = requirements.uppercase ? 'valid' : 'invalid';
      document.getElementById('req-lowercase').className = requirements.lowercase ? 'valid' : 'invalid';
      document.getElementById('req-number').className = requirements.number ? 'valid' : 'invalid';

      return requirements.length && requirements.uppercase && requirements.lowercase && requirements.number;
    }

    function validateConfirmPassword() {
      const password = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const confirmInput = document.getElementById('confirmPassword');
      const errorSpan = document.getElementById('confirmPasswordError');

      if (confirmPassword && password !== confirmPassword) {
        confirmInput.classList.add('error');
        errorSpan.textContent = t.errorMismatch;
        errorSpan.classList.add('show');
        return false;
      } else {
        confirmInput.classList.remove('error');
        errorSpan.classList.remove('show');
        return true;
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();

      const password = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');
      const formError = document.getElementById('formError');

      // Validate
      const isPasswordValid = validatePasswordRequirements();
      const isConfirmValid = validateConfirmPassword();

      if (!isPasswordValid) {
        formError.textContent = t.errorWeak;
        formError.style.display = 'block';
        return;
      }

      if (!isConfirmValid || password !== confirmPassword) {
        formError.textContent = t.errorMismatch;
        formError.style.display = 'block';
        return;
      }

      // Hide error
      formError.style.display = 'none';

      // Show loading state
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.textContent = t.submitting;

      try {
        // Update password using Supabase
        const { data, error } = await supabase.auth.updateUser({
          password: password
        });

        if (error) {
          console.error('Password update error:', error);
          formError.textContent = error.message || t.errorGeneric;
          formError.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          submitBtn.textContent = t.submitButton;
          return;
        }

        console.log('Password updated successfully:', data);
        showSuccess();

      } catch (err) {
        console.error('Unexpected error:', err);
        formError.textContent = t.errorGeneric;
        formError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = t.submitButton;
      }
    }

    // Initialize page
    async function init() {
      try {
        console.log('=== PASSWORD RESET PAGE ===');
        console.log('Full URL:', window.location.href);
        console.log('Environment:', env);
        console.log('Supabase URL:', config.url);
        console.log('Code:', code || 'Not provided');
        console.log('Access Token:', accessToken ? 'Present' : 'Not available');
        console.log('Refresh Token:', refreshToken ? 'Present' : 'Not available');
        console.log('Error Code:', errorCode || 'None');
        console.log('Detected language:', userLang);
        console.log('===========================');

        // Check for errors first
        if (errorCode) {
          console.log('Showing error due to errorCode');
          showError(errorDescription || t.errorExpired);
          return;
        }

        // If we have a code (PKCE flow), exchange it for a session
        if (code) {
          console.log('Attempting to exchange code for session...');
          try {
            const { data, error } = await supabase.auth.exchangeCodeForSession(code);

            if (error) {
              console.error('Code exchange error:', error);
              showError(error.message || t.errorExpired);
              return;
            }

            console.log('Session established:', data.session ? 'Yes' : 'No');
            showResetForm();

          } catch (err) {
            console.error('Code exchange exception:', err);
            showError(err.message || t.errorExpired);
          }
          return;
        }

        // If we have tokens in the hash (implicit flow)
        if (accessToken && refreshToken) {
          console.log('Attempting to set session from tokens...');
          try {
            const { data, error } = await supabase.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken
            });

            if (error) {
              console.error('Set session error:', error);
              showError(error.message || t.errorExpired);
              return;
            }

            console.log('Session set from tokens');
            showResetForm();

          } catch (err) {
            console.error('Set session exception:', err);
            showError(err.message || t.errorExpired);
          }
          return;
        }

        // Check if there's an existing session (user might have refreshed the page)
        console.log('Checking for existing session...');
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          console.log('Existing session found');
          showResetForm();
          return;
        }

        // No valid token or code - show error
        console.log('No code, tokens, or session found - showing error');
        showError(t.errorExpired);

      } catch (err) {
        console.error('Init error:', err);
        showError(err.message || t.errorGeneric);
      }
    }

    // Set a timeout to show error if page is stuck loading
    const loadingTimeout = setTimeout(() => {
      console.error('Loading timeout - page stuck');
      showError(t.errorGeneric + ' (Timeout)');
    }, 15000);

    // Run initialization and clear timeout when done
    window.onload = async function() {
      await init();
      clearTimeout(loadingTimeout);
    };

    // Also try to init immediately if DOM is already ready
    if (document.readyState === 'complete') {
      init().then(() => clearTimeout(loadingTimeout));
    }
  </script>
</body>
</html>
