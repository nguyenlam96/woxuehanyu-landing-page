<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoXueHanyu - Reset Password</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <!-- iOS Smart Banner - Replace YOUR_APP_STORE_ID with actual App Store ID -->
  <meta name="apple-itunes-app" content="app-id=YOUR_APP_STORE_ID">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 64px;
      margin-bottom: 24px;
      animation: bounceIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    h1 {
      color: #111827;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      animation: fadeIn 0.6s ease-out 0.6s both;
    }

    .message {
      color: #6b7280;
      font-size: 16px;
      margin: 16px 0;
      line-height: 1.6;
      animation: fadeIn 0.6s ease-out 0.7s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loader {
      border: 4px solid #f3f4f6;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      animation: spin 1s linear infinite;
      margin: 24px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .button {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 600;
      font-size: 16px;
      margin-top: 24px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
      animation: fadeIn 0.6s ease-out 0.8s both;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
    }

    .button:active {
      transform: translateY(0);
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 12px;
      font-size: 14px;
      color: #6b7280;
      animation: fadeIn 0.6s ease-out 0.9s both;
    }

    .error {
      color: #ef4444;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="status">
      <div class="logo">🔐</div>
      <div class="loader"></div>
      <p class="message">Preparing your password reset...</p>
    </div>
  </div>

  <script>
    // Get error params
    const urlParams = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const errorCode = urlParams.get('error') || hashParams.get('error_code');
    const errorDescription = urlParams.get('error_description') || hashParams.get('error_description');

    // Localization: Detect language from URL param or browser
    const langParam = urlParams.get('lang');
    const browserLang = navigator.language || navigator.userLanguage;
    const userLang = langParam || (browserLang.startsWith('vi') ? 'vi' : 'en');

    // Translations
    const translations = {
      en: {
        loading: 'Preparing your password reset...',
        title: 'Reset Your Password',
        message: 'To reset your password, you need to have the <strong>WoXueHanyu</strong> app installed on your device.',
        installTitle: 'Install the app:',
        installText: 'Download WoXueHanyu from the App Store (iOS) or Google Play (Android).',
        thenTitle: 'Then:',
        thenText: 'Click the password reset link again from this device to open it in the app and complete your password reset.',
        errorTitle: 'Error',
        errorTryAgain: 'Please try requesting a new password reset link from the app.',
        errorDefault: 'Invalid or expired password reset link.'
      },
      vi: {
        loading: 'Đang chuẩn bị đặt lại mật khẩu...',
        title: 'Đặt Lại Mật Khẩu',
        message: 'Để đặt lại mật khẩu, bạn cần cài đặt ứng dụng <strong>WoXueHanyu</strong> trên thiết bị của mình.',
        installTitle: 'Cài đặt ứng dụng:',
        installText: 'Tải WoXueHanyu từ App Store (iOS) hoặc Google Play (Android).',
        thenTitle: 'Sau đó:',
        thenText: 'Nhấp lại vào liên kết đặt lại mật khẩu từ thiết bị này để mở trong ứng dụng và hoàn tất việc đặt lại mật khẩu.',
        errorTitle: 'Lỗi',
        errorTryAgain: 'Vui lòng yêu cầu liên kết đặt lại mật khẩu mới từ ứng dụng.',
        errorDefault: 'Liên kết đặt lại mật khẩu không hợp lệ hoặc đã hết hạn.'
      }
    };

    // Get current language translations
    const t = translations[userLang] || translations.en;

    // Update page title
    document.title = userLang === 'vi' ? 'WoXueHanyu - Đặt Lại Mật Khẩu' : 'WoXueHanyu - Reset Password';

    function updateUI(content) {
      document.getElementById('status').innerHTML = content;
    }

    function showError(message) {
      updateUI(`
        <div class="logo">⚠️</div>
        <h1>${t.errorTitle}</h1>
        <p class="message error">${message}</p>
        <p class="message">${t.errorTryAgain}</p>
      `);
    }

    function showFallback() {
      // This page should only display if the Universal Link didn't open the app
      // (app is not installed or user is on desktop/web browser)
      updateUI(`
        <div class="logo">🔐</div>
        <h1>${t.title}</h1>
        <p class="message">${t.message}</p>
        <div class="info">
          📱 <strong>${t.installTitle}</strong><br>
          ${t.installText}<br><br>
          🔑 <strong>${t.thenTitle}</strong><br>
          ${t.thenText}
        </div>
      `);
    }

    // Update initial loading message with localized text
    document.querySelector('.message').textContent = t.loading;

    // Initialize page
    window.onload = function() {
      console.log('=== PASSWORD RESET PAGE ===');
      console.log('Full URL:', window.location.href);
      console.log('Detected language:', userLang);
      console.log('============================');

      // Check for errors
      if (errorCode) {
        showError(errorDescription || t.errorDefault);
        return;
      }

      // Show fallback message
      showFallback();
    };
  </script>
</body>
</html>
